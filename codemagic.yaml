# Codemagic CI — iOS Simulator E2E (NO Apple account / NO code signing required).
#
# Builds NMOAcademy for the iOS Simulator in Release (so the JS bundle is embedded
# and no Metro server is needed), boots a simulator, installs the app, and runs
# Maestro UI flows. Artifacts returned: screenshots, video, and a JUnit report.
#
# Setup (one-time): codemagic.io → add this repo (or upload a zip) → run "ios-simulator-e2e".
# No certificates, provisioning profiles, or Apple Developer account needed for this workflow.

workflows:
  ios-simulator-e2e:
    name: iOS Simulator E2E (Maestro)
    instance_type: mac_mini_m2
    max_build_duration: 60
    environment:
      vars:
        SIM_DEVICE: "iPhone 16"          # any installed simulator; adjust if Codemagic image differs
        BUNDLE_ID: "com.techverticks.nmoAcademyDemo"
      node: 20                            # RN 0.81 requires Node >= 20.19
      xcode: 16.4                         # pin a stable Xcode; "latest" = Xcode 26 beta, fmt/Folly won't compile
      cocoapods: default
    scripts:
      - name: Install JS dependencies
        script: npm install --legacy-peer-deps

      - name: Install CocoaPods dependencies (via Bundler — RN pins CocoaPods 1.15.2)
        script: |
          set -euo pipefail
          # The app's Gemfile pins cocoapods 1.15.2; use it via bundler.
          bundle install
          cd ios
          # The committed Podfile.lock is stale vs the installed JS deps (e.g. it pins
          # Firebase/Auth 12.2.0 but @react-native-firebase/auth needs 12.10.0).
          # Remove it so CocoaPods resolves a fresh, consistent set against node_modules.
          rm -f Podfile.lock
          bundle exec pod install --repo-update

      - name: Build for iOS Simulator (Release, unsigned)
        script: |
          set -uo pipefail
          # Build arm64-only for the Apple-Silicon (M2) simulator (faster; matches the sim we run).
          xcodebuild \
            -workspace ios/NMOAcademy.xcworkspace \
            -scheme NMOAcademy \
            -configuration Release \
            -sdk iphonesimulator \
            -derivedDataPath ios/build \
            -destination 'generic/platform=iOS Simulator' \
            ARCHS=arm64 \
            ONLY_ACTIVE_ARCH=YES \
            EXCLUDED_ARCHS=x86_64 \
            CODE_SIGNING_ALLOWED=NO \
            build 2>&1 | tee /tmp/xcb.log
          status=${PIPESTATUS[0]}
          if [ "$status" -ne 0 ]; then
            echo "================ ACTUAL COMPILE ERRORS ================"
            grep -nE "error:|fatal error:" /tmp/xcb.log | tail -60 || true
            exit "$status"
          fi

      - name: Boot simulator
        script: |
          # Try the named device; fall back to the first available iPhone in the image.
          if ! xcrun simctl boot "$SIM_DEVICE" 2>/dev/null; then
            UDID=$(xcrun simctl list devices available | grep -oE '\(([0-9A-F-]{36})\)' | tr -d '()' | head -1)
            echo "Falling back to first available simulator: $UDID"
            xcrun simctl boot "$UDID" || true
          fi
          xcrun simctl bootstatus booted -b || true

      - name: Install app on simulator
        script: |
          set -euo pipefail
          APP_PATH=$(find ios/build/Build/Products -name "NMOAcademy.app" -type d | head -1)
          echo "Installing: $APP_PATH"
          xcrun simctl install booted "$APP_PATH"

      - name: Install Maestro
        script: curl -Ls "https://get.maestro.mobile.dev" | bash

      - name: Run Maestro flows
        script: |
          export PATH="$PATH":"$HOME/.maestro/bin"
          mkdir -p maestro-artifacts
          cd maestro-artifacts
          # Run from inside the artifacts dir so takeScreenshot PNGs (written relative
          # to the working dir) and debug output land here and get uploaded.
          maestro test ../.maestro \
            --format junit --output report.xml \
            --debug-output .
          echo "=== screenshots produced ==="; ls -la *.png || true
    artifacts:
      - maestro-artifacts/**          # screenshots, video, logs, JUnit report
      - ios/build/Build/Products/**/*.app
    # Optional: email the report to yourself
    # publishing:
    #   email:
    #     recipients:
    #       - you@example.com

  # ---------------------------------------------------------------------------
  # Signed build -> TestFlight. AUTOMATIC code signing via the App Store Connect
  # API key (no manual certs/profiles). Setup is done ENTIRELY on the
  # "Environment variables" tab (app Settings -> Environment variables):
  #   Add these 4 vars, each with group "appstore_credentials" and Secret ON:
  #     APP_STORE_CONNECT_ISSUER_ID      = 0f30690d-bafc-495a-b3ad-4ecba6030087
  #     APP_STORE_CONNECT_KEY_IDENTIFIER = 9DRG23SC42
  #     APP_STORE_CONNECT_PRIVATE_KEY    = <contents of AuthKey_9DRG23SC42.p8>
  #     CERTIFICATE_PRIVATE_KEY          = <contents of CERTIFICATE_PRIVATE_KEY.pem>
  # Then run the "ios-testflight" workflow. The build installs on TestFlight and
  # can be tested on any iPhone via a link (no Mac needed by the tester).
  # ---------------------------------------------------------------------------
  ios-testflight:
    name: iOS TestFlight (signed)
    instance_type: mac_mini_m2
    max_build_duration: 90
    environment:
      groups:
        - appstore_credentials   # <- the 4 secret vars above live in this group
      vars:
        BUNDLE_ID: "com.techverticks.nmoAcademyDemo"   # confirmed = the live App Store app's bundle id
        XCODE_WORKSPACE: "ios/NMOAcademy.xcworkspace"
        XCODE_SCHEME: "NMOAcademy"
        APP_STORE_APP_ID: 6468957992                   # the live NMO Academy app record
      node: 20
      xcode: 16.4
      cocoapods: default
    scripts:
      - name: Install JS dependencies
        script: npm install --legacy-peer-deps

      - name: Install CocoaPods (via Bundler, fresh lock)
        script: |
          set -euo pipefail
          bundle install
          cd ios
          rm -f Podfile.lock
          bundle exec pod install --repo-update

      - name: Set up automatic code signing (App Store distribution)
        script: |
          set -euo pipefail
          keychain initialize
          # Fetch (or create) the distribution certificate + App Store provisioning
          # profile for this bundle id, using the App Store Connect API key.
          app-store-connect fetch-signing-files "$BUNDLE_ID" \
            --type IOS_APP_STORE \
            --create
          keychain add-certificates
          xcode-project use-profiles

      - name: Set build number (next TestFlight build)
        script: |
          set -euo pipefail
          cd ios
          LATEST=$(app-store-connect get-latest-testflight-build-number "$APP_STORE_APP_ID" || echo 0)
          agvtool new-version -all $((LATEST + 1))

      - name: Build signed IPA
        script: |
          set -euo pipefail
          xcode-project build-ipa \
            --workspace "$XCODE_WORKSPACE" \
            --scheme "$XCODE_SCHEME"
    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
    publishing:
      app_store_connect:
        api_key: $APP_STORE_CONNECT_PRIVATE_KEY
        key_id: $APP_STORE_CONNECT_KEY_IDENTIFIER
        issuer_id: $APP_STORE_CONNECT_ISSUER_ID
        submit_to_testflight: true
        # beta_groups:            # optional: auto-add testers to a group
        #   - Internal Testers
